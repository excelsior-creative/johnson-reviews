<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/review.jsx"></script>
<script type="text/babel" src="components/pages.jsx"></script>

<script type="text/babel">
function App() {
  const route = useRoute();
  const { tweaks, editMode, update } = useTweaks();

  const page = route.page || 'home';
  const currentNav = ['restaurants', 'hotels', 'travel', 'archive', 'about', 'newsletter'].includes(page) ? page : '';

  let content;
  if (page === 'home' || !page) content = <HomePage key={tweaks.heroVariant} />;
  else if (page === 'review') content = <ReviewPage slug={route.param} />;
  else if (page === 'restaurants' || page === 'hotels' || page === 'travel') content = <CategoryPage category={page} />;
  else if (page === 'archive') content = <ArchivePage />;
  else if (page === 'about') content = <AboutPage />;
  else if (page === 'newsletter') content = <NewsletterPage />;
  else if (page === 'location') content = <LocationPage slug={route.param} />;
  else content = <HomePage />;

  return (
    <div data-screen-label={page} key={page}>
      <Nav currentPage={currentNav} />
      {content}
      <Footer />
      {editMode && <TweaksPanel tweaks={tweaks} update={update} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
